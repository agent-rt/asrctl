name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify build prereqs
        run: |
          cmake --version
          xcrun --find clang++

      - name: Vendor whisper.cpp (silero VAD source)
        run: |
          git clone --depth=1 https://github.com/ggml-org/whisper.cpp _vendor/whisper.cpp

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig fmt --check
        run: zig fmt --check src/ build.zig

      - name: zig build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: smoke
        run: |
          ./zig-out/bin/asrctl version
          ./zig-out/bin/asrctl help > /dev/null
          ./zig-out/bin/asrctl model path
          # Confirm static linkage: should only depend on system frameworks.
          otool -L zig-out/bin/asrctl | tee /tmp/otool.txt
          if grep -q '/opt/homebrew' /tmp/otool.txt; then
            echo "ERROR: binary still links against brew dylibs" >&2
            exit 1
          fi
